<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DELTAPACE | SNIPER ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-target: #f2ff00;
            --neon-glow: rgba(242, 255, 0, 0.3);
            --danger: #ff003c;
            --danger-glow: rgba(255, 0, 60, 0.4);
            --bg-dark: #050505;
            --panel: #121212;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--neon-target);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            overflow: hidden;
            height: 100vh;
        }

        /* EFEITO DE SCANLINE (CARA DE MONITOR ANTIGO/HUD) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* LOBBY ULTRA MODERNO */
        #lobby {
            padding: 30px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        .mission-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .mission-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--neon-glow);
        }

        .input-box {
            background: var(--panel);
            border-left: 4px solid var(--neon-target);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .input-box label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 10px;
            color: #888;
        }

        .input-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 2rem;
            font-family: 'Orbitron', sans-serif;
            outline: none;
        }

        .btn-launch {
            background: var(--neon-target);
            color: #000;
            border: none;
            padding: 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 85% 100%, 0 100%);
            margin-top: 20px;
            transition: 0.3s;
        }

        /* HUD DE TELEMETRIA */
        #hud {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            position: relative;
        }

        .critical-bg {
            animation: danger-pulse 1.5s infinite;
        }

        @keyframes danger-pulse {
            0% { background-color: rgba(0,0,0,1); }
            50% { background-color: rgba(60, 0, 0, 0.4); }
            100% { background-color: rgba(0,0,0,1); }
        }

        .main-delta {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(242, 255, 0, 0.1);
            margin: 10px 0;
            position: relative;
        }

        #delta-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 7rem;
            font-weight: 900;
            text-shadow: 0 0 30px var(--neon-glow);
        }

        .delta-sub {
            font-size: 1rem;
            letter-spacing: 4px;
            opacity: 0.6;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            padding: 10px;
            border-bottom: 1px solid var(--neon-glow);
        }

        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: var(--neon-glow);
            border: 1px solid var(--neon-glow);
        }

        .stat-item {
            background: var(--bg-dark);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .stat-item .label { font-size: 0.6rem; color: #666; margin-bottom: 5px; }
        .stat-item .val { font-size: 1.6rem; font-family: 'Orbitron', sans-serif; color: #fff; }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-ctrl {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 15px 5px;
            font-size: 0.6rem;
            font-family: 'JetBrains Mono';
        }

        .rampa-viz {
            height: 40px;
            width: 100%;
            background: #0a0a0a;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
        }

        #rampa-line {
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-target));
            width: 0%;
            transition: 0.5s;
            opacity: 0.3;
        }

    </style>
</head>
<body id="screen">

    <div id="lobby">
        <div class="mission-header">
            <h1>SNIPER_V2.5</h1>
            <div style="font-size: 0.6rem; letter-spacing: 3px; color: #555;">TACTICAL PACE INTERFACE</div>
        </div>

        <div class="input-box">
            <label>RANGE (KM)</label>
            <input type="number" id="tDist" value="5.00" step="0.1">
        </div>

        <div class="input-box">
            <label>TARGET_PACE (MIN/KM)</label>
            <input type="text" id="tPace" value="05:00">
        </div>

        <div class="input-box">
            <label>EFFORT_RAMP (%)</label>
            <input type="number" id="tRampa" value="5">
        </div>

        <button class="btn-launch" onclick="launch()">ENGAGE MISSION</button>
    </div>

    <div id="hud">
        <div class="top-bar">
            <span id="gps-st">STATUS: SEARCHING_SATELLITE...</span>
            <span id="target-live-pace">TARGET: --:--</span>
        </div>

        <div class="main-delta" id="delta-box">
            <div class="delta-sub">DELTA_TIME</div>
            <div id="delta-value">+0.0</div>
            <div class="delta-sub" id="delta-status">ON_TRACK</div>
        </div>

        <div class="rampa-viz">
            <div id="rampa-line"></div>
        </div>

        <div class="grid-stats">
            <div class="stat-item"><span class="label">DISTANCE</span><span class="val" id="vDist">0.00</span></div>
            <div class="stat-item"><span class="label">ELAPSED</span><span class="val" id="vTime">00:00</span></div>
            <div class="stat-item"><span class="label">LIVE_PACE</span><span class="val" id="vPace">--:--</span></div>
            <div class="stat-item"><span class="label">PROJECTED</span><span class="val" id="vETA">--:--</span></div>
        </div>

        <div class="control-panel">
            <button class="btn-ctrl" onclick="adj(-0.1)">-100M</button>
            <button class="btn-ctrl" onclick="adj(0.1)">+100M</button>
            <button class="btn-ctrl" id="sim-btn" onclick="toggleSim()">SIM_OFF</button>
        </div>
        
        <button class="btn-ctrl" style="margin-top:10px; color:var(--danger); border-color:var(--danger)" onclick="location.reload()">TERMINATE_MISSION</button>
    </div>

    <script>
        let mission = false, startT, dist = 0, isSim = false, wakeLock = null;
        let mDist, mPace, mRampa;

        async function lock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.requestWakeLock('screen'); } catch(e) {} }

        function launch() {
            mDist = parseFloat(document.getElementById('tDist').value);
            mRampa = parseFloat(document.getElementById('tRampa').value) / 100;
            let p = document.getElementById('tPace').value.split(':');
            mPace = (parseInt(p[0]) * 60) + parseInt(p[1]);

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            mission = true; startT = Date.now();
            lock();
            update();
        }

        function adj(v) { dist = Math.max(0, dist + v); }
        function toggleSim() { isSim = !isSim; document.getElementById('sim-btn').innerText = isSim ? "SIM_ON" : "SIM_OFF"; }

        function update() {
            if (!mission) return
