<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DELTAPACE | SNIPER v2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #F2FF00; --danger: #FF3E3E; --bg: #000; --surface: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--neon); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; overflow: hidden; }
        
        /* ANIMAÇÃO DE PULSO PARA O DELTA ATRASADO */
        @keyframes pulse-danger {
            0% { box-shadow: inset 0 0 0px var(--danger); }
            50% { box-shadow: inset 0 0 50px var(--danger); }
            100% { box-shadow: inset 0 0 0px var(--danger); }
        }
        .critical-delay { animation: pulse-danger 1s infinite; }

        #lobby, #hud { padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        .input-group { background: var(--surface); padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--neon); color: #fff; font-size: 1.5rem; outline: none; font-family: inherit; }
        
        .delta-container { text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        #delta-value { font-size: 6rem; font-weight: 700; line-height: 1; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-card { background: var(--surface); padding: 12px; text-align: center; }
        .stat-value { font-size: 1.5rem; color: #fff; display: block; }
        .stat-label { font-size: 0.6rem; opacity: 0.7; }

        .btn { border: none; padding: 18px; font-weight: bold; font-size: 1rem; border-radius: 4px; cursor: pointer; font-family: inherit; }
        .btn-primary { background: var(--neon); color: #000; }
        .btn-calib { background: #222; color: #fff; font-size: 0.7rem; padding: 10px; border: 1px solid #444; }
        
        .hud-footer { display: flex; flex-direction: column; gap: 10px; }
        .gps-status { font-size: 0.5rem; text-align: center; opacity: 0.5; }
    </style>
</head>
<body id="main-body">

    <div id="lobby">
        <h1 style="text-align:center; border-bottom:2px solid var(--neon); padding-bottom:10px; margin-bottom:20px;">SNIPER v2.1</h1>
        <div class="input-group"><label style="font-size:0.7rem">DISTÂNCIA (KM)</label><input type="number" id="tDist" value="5.0"></div>
        <div class="input-group"><label style="font-size:0.7rem">PACE ALVO (MIN/KM)</label><input type="text" id="tPace" value="05:00"></div>
        <div class="input-group"><label style="font-size:0.7rem">RAMPA (%)</label><input type="number" id="tRampa" value="5"></div>
        <button class="btn btn-primary" onclick="startMission()" style="margin-top:auto">TRAVAR ALVO & INICIAR</button>
    </div>

    <div id="hud" style="display:none">
        <div class="gps-status" id="gps-st">SINAL: PROCURANDO...</div>
        <div class="delta-container">
            <div style="font-size:0.8rem">DELTA (SEG)</div>
            <div id="delta-value">+0.0</div>
            <div id="target-live" style="font-size:0.8rem; opacity:0.6">ALVO: --:--</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">KM</span><span id="vDist" class="stat-value">0.00</span></div>
            <div class="stat-card"><span class="stat-label">TEMPO</span><span id="vTime" class="stat-value">00:00</span></div>
            <div class="stat-card"><span class="stat-label">PACE</span><span id="vPace" class="stat-value">--:--</span></div>
            <div class="stat-card"><span class="stat-label">PROJ.</span><span id="vETA" class="stat-value">--:--</span></div>
        </div>

        <div class="hud-footer">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-calib" onclick="adjDist(-0.1)">- 100M</button>
                <button class="btn btn-calib" onclick="adjDist(0.1)">+ 100M</button>
            </div>
            <button class="btn btn-calib" id="sim-btn" onclick="toggleSim()">SIMULAR CORRIDA</button>
            <button class="btn" style="background:#300; color:var(--danger); padding:10px" onclick="location.reload()">ABORTAR</button>
        </div>
    </div>

    <script>
        let mission = false, startT, dist = 0, isSim = false, wakeLock = null;
        let mDist, mPace, mRampa;

        // WAKE LOCK: Impede a tela de apagar
        async function lockScreen() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.requestWakeLock('screen'); } catch(e) {}
        }

        function startMission() {
            mDist = parseFloat(document.getElementById('tDist').value);
            mRampa = parseFloat(document.getElementById('tRampa').value) / 100;
            let p = document.getElementById('tPace').value.split(':');
            mPace = (parseInt(p[0]) * 60) + parseInt(p[1]);

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            mission = true; startT = Date.now();
            lockScreen();
            update();
        }

        function adjDist(v) { dist = Math.max(0, dist + v); }

        function toggleSim() { isSim = !isSim; document.getElementById('sim-btn').innerText = isSim ? "SIMULADOR: ON" : "SIMULADOR: OFF"; }

        function update() {
            if (!mission) return;
            if (isSim) dist += 0.0015; // Simulação estável

            let elapsed = (Date.now() - startT) / 1000;
            let progress = Math.min(dist / mDist, 1);
            
            // Lógica de Rampa
            let factor = (1 + mRampa) - (2 * mRampa * progress);
            let targetLive = mPace * factor;
            let idealTime = dist * (mPace * (1 + mRampa - (mRampa * progress / 2)));
            let delta = elapsed - idealTime;

            // UI
            document.getElementById('vDist').innerText = dist.toFixed(2);
            document.getElementById('vTime').innerText = Math.floor(elapsed/60).toString().padStart(2,'0') + ":" + Math.floor(elapsed%60).toString().padStart(2,'0');
            document.getElementById('target-live').innerText = "ALVO: " + Math.floor(targetLive/60) + ":" + Math.floor(targetLive%60).toString().padStart(2,'0');
            
            let dVal = document.getElementById('delta-value');
            dVal.innerText = (delta > 0 ? "+" : "") + delta.toFixed(1);
            
            // Efeito de Pulso se estiver atrasado > 2 segundos
            if(delta > 2) document.getElementById('main-body').classList.add('critical-delay');
            else document.getElementById('main-body').classList.remove('critical-delay');

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
